name: velo
description: Vehicle speedometer and telemetry app — local-first, offline capable.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── State management ────────────────────────────────────────────────────────
  get: ^4.6.6

  # ── Sensors ─────────────────────────────────────────────────────────────────
  geolocator: ^13.0.0
  sensors_plus: ^6.1.0
  flutter_compass: ^0.8.0

  # ── Map ─────────────────────────────────────────────────────────────────────
  flutter_map: ^7.0.1
  latlong2: ^0.9.0

  # ── Local database (drift / SQLite) ─────────────────────────────────────────
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # ── Camera & video ───────────────────────────────────────────────────────────
  camera: ^0.11.0

  # ── Firebase & Google Auth ────────────────────────────────────────────────────
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.2.0
  google_sign_in: ^6.2.1

  # ── Storage & prefs ──────────────────────────────────────────────────────────
  shared_preferences: ^2.3.2

  # ── Background & wake lock ───────────────────────────────────────────────────
  wakelock_plus: ^1.2.8

  # ── Gallery & Image picker ────────────────────────────────────────────────────
  gal: ^2.3.0
  image_picker: ^1.1.2

  # ── Utils ────────────────────────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.18.0
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon/icon.png"
  adaptive_icon_background: "#000000"
  background_color: "#000000"

flutter:
  uses-material-design: true
  assets:
    - assets/images/icon/icon.png
  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/montserrat.black.ttf
          weight: 900
    - family: Poppins
      fonts:
        - asset: assets/fonts/poppins.regular.ttf
          weight: 400
